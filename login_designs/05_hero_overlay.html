<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbiFresh - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><linearGradient id="grad" x1="0%25" y1="0%25" x2="100%25" y2="100%25"><stop offset="0%25" style="stop-color:rgb(34,197,94);stop-opacity:1" /><stop offset="50%25" style="stop-color:rgb(59,130,246);stop-opacity:1" /><stop offset="100%25" style="stop-color:rgb(236,72,153);stop-opacity:1" /></linearGradient></defs><rect width="1200" height="600" fill="url(%23grad)"/><circle cx="200" cy="100" r="80" fill="rgba(255,255,255,0.1)"/><circle cx="1000" cy="500" r="120" fill="rgba(255,255,255,0.08)"/><path d="M 0 300 Q 300 200, 600 300 T 1200 300 L 1200 600 L 0 600 Z" fill="rgba(255,255,255,0.1)"/></svg>') center/cover no-repeat fixed;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.3) 0%, rgba(15, 23, 42, 0.5) 100%);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            border-radius: 15px;
            font-size: 32px;
            margin-bottom: 15px;
            box-shadow: 0 8px 15px rgba(236, 72, 153, 0.3);
            margin-left: auto;
            margin-right: auto;
        }

        .card-header h1 {
            color: #1f2937;
            font-size: 32px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .card-header p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ec4899;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-forgot label {
            color: #374151;
            font-weight: normal;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-forgot input[type="checkbox"] {
            margin-right: 6px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #ec4899;
        }

        .remember-forgot a {
            color: #ec4899;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #f472b6;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4);
        }

        .divider {
            text-align: center;
            margin: 22px 0;
            color: #d1d5db;
            font-size: 13px;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }

        .social-btn {
            padding: 10px;
            border: 2px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #374151;
        }

        .social-btn:hover {
            border-color: #ec4899;
            background: #fce7f3;
            color: #ec4899;
        }

        .signup-link {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
        }

        .signup-link a {
            color: #ec4899;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .footer-hint {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .card-header h1 {
                font-size: 26px;
            }

            .brand-badge {
                width: 50px;
                height: 50px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="card-header">
                <div class="brand-badge">🌾</div>
                <h1>AbiFresh</h1>
                <p>Agricultural Network</p>
                <div class="subtitle">Fresh from Farm to Table</div>
            </div>
            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="button" class="btn-login">Sign In to Dashboard</button>
                <div class="divider">or continue with</div>
                <div class="social-auth">
                    <button type="button" class="social-btn">🔵 Google</button>
                    <button type="button" class="social-btn">⚫ GitHub</button>
                </div>
                <div class="signup-link">
                    Don't have an account? <a href="#">Create one now</a>
                </div>
            </form>
            <div class="footer-hint">
                Secure login powered by AbiFresh • Privacy Policy
            </div>
        </div>
    </div>
</body>
</html>

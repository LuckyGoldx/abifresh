<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKV – Neon Pink</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      background: #0a0010;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Grid lines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(244,63,142,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(244,63,142,.06) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* Radial glow */
    .glow-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none;
    }
    .glow-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(236,72,153,.25) 0%, transparent 70%);
      top: -100px; right: -100px;
    }
    .glow-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(168,85,247,.2) 0%, transparent 70%);
      bottom: -80px; left: -80px;
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 480px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(244,63,142,.2);
      border-radius: 24px;
      padding: 48px 44px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(244,63,142,.12), 0 0 120px rgba(244,63,142,.05), inset 0 1px 0 rgba(255,255,255,.06);
    }

    .logo-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 36px;
    }
    .logo-badge {
      width: 46px; height: 46px; border-radius: 13px;
      background: linear-gradient(135deg, #f43f8e, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(244,63,142,.5);
    }
    .logo-text { color: white; }
    .logo-text .name { font-size: 17px; font-weight: 700; line-height: 1; }
    .logo-text .tagline { font-size: 11px; opacity: .5; margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

    h1 {
      font-size: 26px; font-weight: 600; color: white;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 13px; color: rgba(255,255,255,.4);
      margin-bottom: 28px;
    }

    /* Role pills */
    .roles {
      display: flex; gap: 8px; margin-bottom: 28px;
    }
    .role-pill {
      flex: 1; padding: 8px 10px; border-radius: 8px;
      border: 1px solid rgba(244,63,142,.25); background: transparent;
      font-family: inherit; font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,.45); cursor: pointer; transition: all .2s;
      text-align: center;
    }
    .role-pill.active {
      background: linear-gradient(135deg, rgba(244,63,142,.25), rgba(168,85,247,.2));
      border-color: #f43f8e;
      color: #fda4c7;
      box-shadow: 0 0 16px rgba(244,63,142,.2);
    }
    .role-pill:hover:not(.active) { border-color: rgba(244,63,142,.5); color: rgba(255,255,255,.7); }

    .field { margin-bottom: 16px; }
    .field label {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,.5); margin-bottom: 7px; display: block;
      letter-spacing: .5px; text-transform: uppercase;
    }
    .field input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(244,63,142,.2); border-radius: 10px;
      color: white; font-family: inherit; font-size: 14px; outline: none;
      transition: all .2s;
    }
    .field input::placeholder { color: rgba(255,255,255,.2); }
    .field input:focus {
      border-color: #f43f8e;
      background: rgba(244,63,142,.06);
      box-shadow: 0 0 0 3px rgba(244,63,142,.12), 0 0 20px rgba(244,63,142,.15);
    }

    .meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .remember { display: flex; align-items: center; gap: 7px; font-size: 12px; color: rgba(255,255,255,.4); cursor: pointer; }
    .remember input { accent-color: #f43f8e; }
    .forgot { font-size: 12px; color: #f43f8e; text-decoration: none; }
    .forgot:hover { color: #fda4c7; }

    .btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 12px; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #f43f8e 0%, #ec4899 50%, #a855f7 100%);
      box-shadow: 0 4px 24px rgba(244,63,142,.45), 0 0 40px rgba(244,63,142,.15);
      transition: all .25s; position: relative; overflow: hidden;
    }
    .btn::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(255,255,255,.15) 0%, transparent 60%);
      opacity: 0; transition: opacity .3s;
    }
    .btn:hover::before { opacity: 1; }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(244,63,142,.55), 0 0 60px rgba(244,63,142,.2);
    }

    .footer {
      margin-top: 24px; text-align: center;
      font-size: 12px; color: rgba(255,255,255,.25);
    }
    .footer a { color: #f43f8e; text-decoration: none; }

    /* Status dots */
    .status-bar {
      display: flex; gap: 10px; justify-content: center;
      margin-top: 24px;
    }
    .dot-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: rgba(255,255,255,.3);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981;
      box-shadow: 0 0 6px #10b981; }

    @media (max-width: 520px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="container">
    <div class="card">
      <div class="logo-row">
        <div class="logo-badge">✦</div>
        <div class="logo-text">
          <div class="name">Abifresh &amp; Kiddies Ventures</div>
          <div class="tagline">Business Management System</div>
        </div>
      </div>

      <h1>Sign In</h1>
      <p class="sub">Select your role and enter your credentials</p>

      <div class="roles">
        <div class="role-pill active">Admin</div>
        <div class="role-pill">Sales</div>
        <div class="role-pill">Staff</div>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="admin@abifresh.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••••" />
      </div>

      <div class="meta">
        <label class="remember"><input type="checkbox" /> Keep me signed in</label>
        <a href="#" class="forgot">Reset password</a>
      </div>

      <button class="btn">Access Dashboard →</button>

      <div class="status-bar">
        <div class="dot-status"><div class="dot"></div> API Online</div>
        <div class="dot-status"><div class="dot"></div> Secure Connection</div>
      </div>

      <div class="footer">
        Trouble logging in? <a href="#">Contact administrator</a>
      </div>
    </div>
  </div>
</body>
</html>

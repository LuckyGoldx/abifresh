<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbiFresh - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8f4f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .login-box {
            background: linear-gradient(145deg, #f8f6f0, #e8e6e1);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 
                7px 7px 15px rgba(0, 0, 0, 0.08),
                -7px -7px 15px rgba(255, 255, 255, 0.9),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
        }

        .login-box:hover {
            box-shadow: 
                10px 10px 20px rgba(0, 0, 0, 0.1),
                -10px -10px 20px rgba(255, 255, 255, 0.95),
                inset 0 0 0 1px rgba(255, 255, 255, 0.7);
        }

        .card-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(236, 72, 153, 0.2));
        }

        .card-header h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .card-header p {
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            background: linear-gradient(145deg, #f0ebe5, #faf8f3);
            border: none;
            border-radius: 12px;
            font-size: 14px;
            color: #2d3748;
            transition: all 0.3s ease;
            box-shadow: 
                3px 3px 8px rgba(0, 0, 0, 0.06),
                -3px -3px 8px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.02);
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 
                3px 3px 8px rgba(236, 72, 153, 0.15),
                -3px -3px 8px rgba(255, 255, 255, 0.8),
                inset 0 0 0 2px rgba(236, 72, 153, 0.2);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }

        .remember-forgot label {
            color: #4a5568;
            font-weight: 500;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-forgot input[type="checkbox"] {
            margin-right: 6px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #ec4899;
        }

        .remember-forgot a {
            color: #ec4899;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #f472b6;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(145deg, #ec4899, #f472b6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            box-shadow: 
                4px 4px 10px rgba(236, 72, 153, 0.3),
                -4px -4px 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 
                6px 6px 15px rgba(236, 72, 153, 0.4),
                -6px -6px 15px rgba(255, 255, 255, 0.6);
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 
                2px 2px 5px rgba(236, 72, 153, 0.2),
                -2px -2px 5px rgba(255, 255, 255, 0.4),
                inset 4px 4px 8px rgba(0, 0, 0, 0.1);
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #a0aec0;
            font-size: 12px;
            position: relative;
            letter-spacing: 1px;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(to right, transparent, #cbd5e0);
        }

        .divider::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(to left, transparent, #cbd5e0);
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }

        .social-btn {
            padding: 11px;
            background: linear-gradient(145deg, #f0ebe5, #faf8f3);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            transition: all 0.3s ease;
            box-shadow: 
                3px 3px 8px rgba(0, 0, 0, 0.05),
                -3px -3px 8px rgba(255, 255, 255, 0.8);
        }

        .social-btn:hover {
            box-shadow: 
                4px 4px 10px rgba(236, 72, 153, 0.15),
                -4px -4px 10px rgba(255, 255, 255, 0.8);
            color: #ec4899;
        }

        .signup-link {
            text-align: center;
            color: #718096;
            font-size: 13px;
        }

        .signup-link a {
            color: #ec4899;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #f472b6;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }

            .card-header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="card-header">
                <div class="logo">🌾</div>
                <h1>AbiFresh</h1>
                <p>Modern Agricultural Platform</p>
            </div>
            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox"> Keep me signed in
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="button" class="btn-login">Sign In</button>
                <div class="divider">or try</div>
                <div class="social-auth">
                    <button type="button" class="social-btn">Google</button>
                    <button type="button" class="social-btn">GitHub</button>
                </div>
                <div class="signup-link">
                    New to AbiFresh? <a href="#">Create account</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

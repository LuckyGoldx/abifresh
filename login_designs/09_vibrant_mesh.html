<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbiFresh - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #ec4899 50%, #f472b6 75%, #fbbf24 100%);
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
            position: relative;
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mesh-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><pattern id="noise" patternUnits="userSpaceOnUse" width="100" height="100"><circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><circle cx="50" cy="50" r="15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></pattern></defs><rect width="1200" height="600" fill="url(%23noise)"/></svg>');
            pointer-events: none;
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-bg {
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ec4899, #f472b6, #fbbf24);
            border-radius: 20px;
            opacity: 0.2;
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo {
            position: relative;
            font-size: 48px;
            z-index: 1;
        }

        .card-header h1 {
            color: #1f2937;
            font-size: 36px;
            margin-bottom: 8px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #ec4899 50%, #f472b6 75%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .card-header p {
            color: #6b7280;
            font-size: 15px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #374151;
            font-weight: 700;
            margin-bottom: 9px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            font-size: 14px;
            background: linear-gradient(135deg, #f8f7ff 0%, #f5f3ff 100%);
            transition: all 0.3s ease;
            color: #1f2937;
        }

        .form-group input::placeholder {
            color: #b4b9d9;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ec4899;
            background: white;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-forgot label {
            color: #374151;
            font-weight: 500;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-forgot input[type="checkbox"] {
            margin-right: 6px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #ec4899;
        }

        .remember-forgot a {
            color: #ec4899;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #f472b6;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 50%, #fbbf24 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 18px;
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden;
            position: relative;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(236, 72, 153, 0.4);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #d1d5db;
            font-size: 12px;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 32%;
            height: 2px;
            background: linear-gradient(to right, transparent, #ec4899);
        }

        .divider::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 32%;
            height: 2px;
            background: linear-gradient(to left, transparent, #ec4899);
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            padding: 11px;
            border: 2px solid #e0e7ff;
            background: linear-gradient(135deg, #f8f7ff 0%, #f5f3ff 100%);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: #667eea;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .social-btn:hover {
            border-color: #ec4899;
            background: linear-gradient(135deg, #fce7f3 0%, #f5e7ff 100%);
            color: #ec4899;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(236, 72, 153, 0.2);
        }

        .signup-link {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
        }

        .signup-link a {
            color: #ec4899;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            color: #f472b6;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .card-header h1 {
                font-size: 28px;
            }

            .logo-wrapper {
                width: 60px;
                height: 60px;
            }

            .logo-bg {
                width: 60px;
                height: 60px;
            }

            .logo {
                font-size: 38px;
            }
        }
    </style>
</head>
<body>
    <div class="mesh-overlay"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="card-header">
                <div class="logo-wrapper">
                    <div class="logo-bg"></div>
                    <div class="logo">🌾</div>
                </div>
                <h1>AbiFresh</h1>
                <p>Agriculture Ecosystem</p>
            </div>
            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="button" class="btn-login">Sign In</button>
                <div class="divider">continue with</div>
                <div class="social-auth">
                    <button type="button" class="social-btn">Google</button>
                    <button type="button" class="social-btn">GitHub</button>
                </div>
                <div class="signup-link">
                    Join us? <a href="#">Sign up now</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

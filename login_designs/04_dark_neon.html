<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbiFresh - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e2e8f0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
        }

        .login-box {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.8) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 
                0 0 30px rgba(236, 72, 153, 0.2),
                0 0 60px rgba(102, 126, 234, 0.1),
                inset 0 0 20px rgba(236, 72, 153, 0.05);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { 
                box-shadow: 
                    0 0 30px rgba(236, 72, 153, 0.2),
                    0 0 60px rgba(102, 126, 234, 0.1),
                    inset 0 0 20px rgba(236, 72, 153, 0.05);
            }
            50% { 
                box-shadow: 
                    0 0 40px rgba(236, 72, 153, 0.35),
                    0 0 80px rgba(102, 126, 234, 0.2),
                    inset 0 0 30px rgba(236, 72, 153, 0.1);
            }
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .card-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ec4899 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
        }

        .card-header p {
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #e2e8f0;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(236, 72, 153, 0.2);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ec4899;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-forgot label {
            color: #cbd5e1;
            font-weight: normal;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-forgot input[type="checkbox"] {
            margin-right: 6px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #ec4899;
        }

        .remember-forgot a {
            color: #fbbf24;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #fcd34d;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 18px;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.6);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #64748b;
            font-size: 13px;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(to right, transparent, #ec4899);
        }

        .divider::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(to left, transparent, #ec4899);
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            padding: 10px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .signup-link {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }

        .signup-link a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            color: #fcd34d;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }

            .card-header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="login-container">
        <div class="login-box">
            <div class="card-header">
                <div class="logo">🌾</div>
                <h1>AbiFresh</h1>
                <p>Next-Gen Agro Platform</p>
            </div>
            <form>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="button" class="btn-login">Sign In</button>
                <div class="divider">or use</div>
                <div class="social-auth">
                    <button type="button" class="social-btn">Google</button>
                    <button type="button" class="social-btn">GitHub</button>
                </div>
                <div class="signup-link">
                    New user? <a href="#">Create account</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Generate random stars
        const starsContainer = document.querySelector('.stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
